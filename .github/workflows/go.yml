name: Go

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CMGR_LOGGING: debug

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest

    steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.x'
        cache: true
      id: go

    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Get dependencies
      run: go mod download

    - name: Golang linting
      run: go vet ./...

    - name: Build
      run: |
        mkdir -p bin
        go build -v -ldflags "-X github.com/picoCTF/cmgr/cmgr.version=$(git describe --tags --always)" -o bin/ ./cmd/...

    - name: Unit Tests
      run: go test -v -count=1 -race -coverprofile=coverage.out ./...

    - name: Display Coverage
      run: go tool cover -func=coverage.out

    - name: Prepare Integration Tests
      run:  mkdir artifacts

    - name: Integration Tests
      run: CMGR_DIR=examples CMGR_ARTIFACT_DIR=artifacts bin/cmgr test --require-solve examples
