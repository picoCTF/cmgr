name: Go

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CMGR_LOGGING: debug

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.x'
        cache: true
      id: go

    - name: Get dependencies
      run: go mod download

    - name: Golang linting
      run: go vet ./...

    - name: Build
      run: |
        mkdir -p bin
        go build -v -ldflags "-X github.com/picoCTF/cmgr/cmgr.version=$(git describe --tags --always)" -o bin/ ./cmd/...

    - name: Unit Tests
      run: go test -v -count=1 -race -coverprofile=coverage.out ./...

    - name: Display Coverage
      run: go tool cover -func=coverage.out

    - name: Prepare Integration Tests
      run:  mkdir artifacts

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    # Cached across runs via the GitHub Actions cache, so the heavy libguestfs +
    # kernel install only re-runs when ci/guestfish-base.Dockerfile changes.
    # load: true places the image in the daemon so cmgr's FROM can resolve it.
    - name: Build shared example base image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: ci
        file: ci/guestfish-base.Dockerfile
        tags: cmgr/examples-guestfish-base:latest
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # --keep-images retains build images until the end of the run so challenges
    # can share base layers. Measuring its effect on a cold ephemeral runner
    # (BuildKit cache starts empty) vs the master baseline without the flag.
    - name: Integration Tests
      run: CMGR_DIR=examples CMGR_ARTIFACT_DIR=artifacts bin/cmgr test --require-solve --keep-images examples
